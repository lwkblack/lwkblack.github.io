<!DOCTYPE html>

        body {

            margin-top: 20px;

        .username {

        }
        
.top-right-link {
    position: fixed;

    background: #222;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    font-family: 'Brave Two BC', Arial, sans-serif;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
}

.top-right-link:hover {
    background: #555;
    transform: scale(1.05);
}

<div class="top-right-link" onclick="window.open('https://discord.gg/R2UEaXny', '_blank')">
